document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Sans Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"611847f0-36d9-40b2-bb3d-ba04de10cba3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"dde90124-877e-498d-bb82-f98b7b797d4d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ═══════════════════════════════════════════════════════════════\n   NatMesh · DEFENSE-GRADE WEBSITE\n   palette: black + amber; type: IBM Plex Mono/Sans; vibe: NSA tooling\n═══════════════════════════════════════════════════════════════ */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; font-size: 16px; }\nimg, svg { display: block; }\na { color: inherit; text-decoration: none; }\nbutton { cursor: pointer; font: inherit; border: none; background: none; color: inherit; }\nul, ol { list-style: none; }\n\n:root {\n  /* Surfaces — true noir */\n  --bg-0:   #050505;\n  --bg-1:   #0a0a0a;\n  --bg-2:   #111111;\n  --bg-3:   #161616;\n  --bg-4:   #1c1c1c;\n\n  /* Borders / hairlines */\n  --line:      rgba(255,255,255,0.06);\n  --line-md:   rgba(255,255,255,0.12);\n  --line-hi:   rgba(255,255,255,0.22);\n  --line-amber:rgba(245,165,36,0.22);\n  --line-amber-hi: rgba(245,165,36,0.55);\n\n  /* Amber — the signal color */\n  --amber:    #f5a524;\n  --amber-hi: #fbbf24;\n  --amber-lo: #b45309;\n  --amber-glow: rgba(245,165,36,0.42);\n\n  /* Severity */\n  --crit:    #f87171;\n  --crit-bg: rgba(248,113,113,0.10);\n  --high:    #fb923c;\n  --high-bg: rgba(251,146,60,0.10);\n  --med:     #fbbf24;\n  --med-bg:  rgba(251,191,36,0.10);\n  --ok:      #4ade80;\n  --ok-bg:   rgba(74,222,128,0.10);\n\n  /* Type */\n  --txt:    #fafaf9;\n  --txt-2:  #a8a29e;\n  --txt-3:  #57534e;\n  --txt-4:  #292524;\n\n  /* Fonts */\n  --f-display: 'IBM Plex Sans Condensed', 'IBM Plex Sans', system-ui, sans-serif;\n  --f-sans:    'IBM Plex Sans', system-ui, sans-serif;\n  --f-mono:    'IBM Plex Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace;\n}\n\n/* ─── Base ──────────────────────────────────────────────────── */\nbody {\n  background: var(--bg-0);\n  color: var(--txt);\n  font-family: var(--f-sans);\n  font-size: 14.5px;\n  line-height: 1.6;\n  overflow-x: hidden;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  padding-bottom: 22px;\n}\n\n/* CRT scanline + grain overlay — very subtle, fixed */\nbody::before {\n  content: '';\n  position: fixed; inset: 0;\n  background-image:\n    repeating-linear-gradient(0deg, rgba(255,255,255,0.014) 0 1px, transparent 1px 3px),\n    radial-gradient(circle at 50% 50%, rgba(245,165,36,0.04) 0%, transparent 70%);\n  z-index: 1; pointer-events: none;\n  mix-blend-mode: screen;\n}\nbody::after {\n  content: '';\n  position: fixed; inset: 0;\n  background: radial-gradient(ellipse at top, transparent 0%, rgba(0,0,0,0.45) 100%);\n  z-index: 1; pointer-events: none;\n}\n\n.shell { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 2; }\nsection { padding: 96px 0; position: relative; z-index: 2; }\n\n::-webkit-scrollbar { width: 8px; height: 8px; }\n::-webkit-scrollbar-track { background: var(--bg-1); }\n::-webkit-scrollbar-thumb { background: var(--bg-4); border: 1px solid var(--line); }\n::-webkit-scrollbar-thumb:hover { background: var(--amber-lo); }\n\n::selection { background: var(--amber); color: #000; }\n\n/* ─── Type primitives ───────────────────────────────────────── */\n.mono { font-family: var(--f-mono); }\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--f-mono);\n  font-size: 11px; font-weight: 500;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--amber);\n}\n.eyebrow::before {\n  content: ''; width: 18px; height: 1px; background: var(--amber);\n}\n.eyebrow.no-rule::before { display: none; }\n\nh1, h2, h3, h4, h5 { font-family: var(--f-display); font-weight: 600; letter-spacing: -0.01em; }\n.h-display {\n  font-size: clamp(44px, 6.2vw, 92px);\n  font-weight: 700;\n  line-height: 0.96;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n}\n.h-section {\n  font-size: clamp(34px, 4vw, 56px);\n  font-weight: 700;\n  line-height: 1.02;\n  letter-spacing: -0.018em;\n  text-transform: uppercase;\n}\n.h-card {\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n}\n.lede {\n  font-size: 16.5px;\n  color: var(--txt-2);\n  line-height: 1.65;\n  max-width: 56ch;\n}\n\n/* ─── Classification bar (TOP & BOTTOM) ─────────────────────── */\n.classbar {\n  position: fixed; left: 0; right: 0;\n  height: 22px;\n  background: #000;\n  border-bottom: 1px solid var(--line-amber);\n  color: var(--amber);\n  font-family: var(--f-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.16em;\n  display: flex; align-items: center;\n  z-index: 100;\n  overflow: hidden;\n  text-transform: uppercase;\n}\n.classbar.top { top: 0; }\n.classbar.bottom {\n  bottom: 0; top: auto;\n  border-top: 1px solid var(--line-amber);\n  border-bottom: none;\n}\n.classbar-track {\n  display: flex; gap: 60px; padding: 0 24px;\n  animation: marq 60s linear infinite;\n  white-space: nowrap;\n  flex-shrink: 0;\n}\n.classbar-track span::before {\n  content: '◆ '; color: var(--amber); margin-right: 6px; opacity: 0.6;\n}\n@keyframes marq { to { transform: translateX(-50%); } }\n\n/* ─── Nav ───────────────────────────────────────────────────── */\n#nav {\n  position: fixed; top: 22px; left: 0; right: 0;\n  z-index: 99;\n  background: rgba(5,5,5,0.78);\n  backdrop-filter: blur(14px) saturate(120%);\n  -webkit-backdrop-filter: blur(14px) saturate(120%);\n  border-bottom: 1px solid var(--line);\n  transition: background .25s, border-color .25s;\n}\n#nav.scrolled { background: rgba(5,5,5,0.94); border-bottom-color: var(--line-amber); }\n.nav-inner {\n  max-width: 1280px; margin: 0 auto;\n  height: 62px;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 32px;\n}\n.brand {\n  display: flex; align-items: center; gap: 12px;\n  font-family: var(--f-mono);\n  white-space: nowrap;\n  min-width: 0;\n}\n.brand > span { display: inline-flex; flex-direction: column; line-height: 1.15; }\n.brand-mark {\n  min-width: 30px; height: 30px; padding: 0 6px;\n  border: 1px solid var(--amber);\n  display: flex; align-items: center; justify-content: center;\n  color: var(--amber); font-weight: 700; font-size: 13px; letter-spacing: 0.06em;\n  position: relative;\n  box-shadow: 0 0 0 1px var(--bg-0), 0 0 16px var(--amber-glow);\n}\n.brand-mark::before, .brand-mark::after {\n  content: ''; position: absolute; width: 4px; height: 4px;\n  background: var(--amber);\n}\n.brand-mark::before { top: -2px; left: -2px; }\n.brand-mark::after { bottom: -2px; right: -2px; }\n.brand-name {\n  font-size: 14px; font-weight: 600; letter-spacing: 0.22em;\n  color: var(--txt);\n}\n.brand-tag {\n  font-size: 9px; letter-spacing: 0.16em;\n  color: var(--txt-3);\n  text-transform: uppercase;\n  white-space: nowrap;\n}\n.nav-links {\n  display: flex; align-items: center; gap: 6px;\n  font-family: var(--f-mono);\n  font-size: 12.5px;\n}\n.nav-links a {\n  padding: 8px 14px;\n  color: var(--txt-2);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  transition: color .15s, background .15s;\n  border: 1px solid transparent;\n}\n.nav-links a:hover { color: var(--amber); background: rgba(245,165,36,0.06); }\n.nav-links a.cta {\n  color: var(--amber);\n  border: 1px solid var(--line-amber);\n  padding: 8px 18px;\n  margin-left: 6px;\n  position: relative;\n}\n.nav-links a.cta::before, .nav-links a.cta::after {\n  content: ''; position: absolute; width: 6px; height: 6px;\n  border: 1px solid var(--amber);\n}\n.nav-links a.cta::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }\n.nav-links a.cta::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }\n.nav-links a.cta:hover { background: var(--amber); color: #000; }\n\n/* Burger */\n.burger { display: none; padding: 8px; color: var(--txt-2); }\n.burger span { display: block; width: 22px; height: 2px; background: currentColor; margin: 4px 0; transition: .25s; }\n.burger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }\n.burger.open span:nth-child(2) { opacity: 0; }\n.burger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }\n\n/* ─── Bracketed frame (recurring motif) ────────────────────── */\n.bracketed { position: relative; padding: 28px; }\n.bracketed::before, .bracketed::after {\n  content: ''; position: absolute;\n  width: 18px; height: 18px;\n  border: 2px solid var(--amber);\n}\n.bracketed::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }\n.bracketed::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }\n.bracketed-2 { position: relative; }\n.bracketed-2 span.corner {\n  position: absolute; width: 14px; height: 14px; border: 1.5px solid var(--amber);\n}\n.bracketed-2 span.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }\n.bracketed-2 span.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }\n.bracketed-2 span.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }\n.bracketed-2 span.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }\n\n/* ─── Buttons ───────────────────────────────────────────────── */\n.btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 14px 22px;\n  font-family: var(--f-mono);\n  font-size: 12.5px; font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  border: 1px solid var(--line-md);\n  background: transparent;\n  color: var(--txt);\n  position: relative;\n  transition: all .2s ease;\n}\n.btn:hover { border-color: var(--amber); color: var(--amber); }\n.btn-primary {\n  background: var(--amber);\n  color: #000;\n  border-color: var(--amber);\n  font-weight: 600;\n  box-shadow: 0 0 28px var(--amber-glow);\n}\n.btn-primary:hover {\n  background: var(--amber-hi);\n  color: #000;\n  border-color: var(--amber-hi);\n  box-shadow: 0 0 38px var(--amber-glow);\n  transform: translateY(-1px);\n}\n.btn-primary .arrow { transition: transform .2s; }\n.btn-primary:hover .arrow { transform: translateX(3px); }\n\n/* Bracketed CTA */\n.btn-stamp {\n  position: relative; padding-left: 28px; padding-right: 28px;\n}\n.btn-stamp::before, .btn-stamp::after {\n  content: ''; position: absolute; width: 8px; height: 8px;\n  border: 1.5px solid currentColor;\n}\n.btn-stamp::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }\n.btn-stamp::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }\n\n/* ─── Reveal ───────────────────────────────────────────────── */\n.reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s ease, transform .7s ease; }\n.reveal.in { opacity: 1; transform: none; }\n\n/* ═══════════════════════════════════════════════════════════════\n   HERO\n═══════════════════════════════════════════════════════════════ */\n.hero {\n  padding: 120px 0 64px;\n  min-height: 100vh;\n  box-sizing: border-box;\n  position: relative;\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.05fr 1fr;\n  gap: 56px;\n  align-items: start;\n}\n.hero-meta {\n  display: flex; gap: 20px; align-items: center;\n  margin-bottom: 32px;\n  font-family: var(--f-mono);\n  font-size: 10.5px; letter-spacing: 0.18em;\n  color: var(--txt-3); text-transform: uppercase;\n}\n.hero-meta .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--ok);\n  box-shadow: 0 0 8px var(--ok);\n  animation: pulse 1.6s ease-in-out infinite;\n}\n@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }\n\n.hero h1 { margin-bottom: 24px; }\n.hero h1 .amber { color: var(--amber); }\n.hero h1 .strike {\n  position: relative; color: var(--txt-3);\n}\n.hero h1 .strike::after {\n  content: ''; position: absolute;\n  left: -4px; right: -4px; top: 52%;\n  height: 4px; background: var(--crit);\n  transform: skewY(-2deg);\n}\n\n.hero-lede {\n  font-size: 17px; color: var(--txt-2);\n  line-height: 1.65; max-width: 54ch;\n  margin-bottom: 36px;\n}\n.hero-lede strong { color: var(--txt); font-weight: 500; }\n\n.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 44px; }\n\n.hero-fact-grid {\n  display: grid; grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  border-top: 1px solid var(--line);\n  font-family: var(--f-mono);\n}\n.hero-fact { padding: 18px 16px 0 0; border-right: 1px dashed var(--line); }\n.hero-fact:last-child { border-right: none; padding-right: 0; }\n.hero-fact-num {\n  font-family: var(--f-display);\n  font-size: 28px; font-weight: 700;\n  color: var(--amber); line-height: 1; letter-spacing: -0.01em;\n}\n.hero-fact-lbl {\n  font-size: 10px; letter-spacing: 0.18em;\n  color: var(--txt-3); text-transform: uppercase;\n  margin-top: 6px;\n}\n\n/* ─── Hero terminal ─────────────────────────────────────────── */\n.term {\n  background: #050505;\n  border: 1px solid var(--line-md);\n  position: relative;\n  font-family: var(--f-mono);\n  box-shadow:\n    0 30px 80px rgba(0,0,0,0.7),\n    0 0 0 1px rgba(255,255,255,0.02),\n    inset 0 0 120px rgba(245,165,36,0.04);\n}\n.term-frame {\n  position: absolute; inset: -1px;\n  pointer-events: none;\n}\n.term-frame span {\n  position: absolute; width: 16px; height: 16px;\n  border: 2px solid var(--amber);\n}\n.term-frame span.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }\n.term-frame span.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }\n.term-frame span.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }\n.term-frame span.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }\n\n.term-head {\n  display: flex; align-items: center;\n  padding: 10px 16px;\n  border-bottom: 1px solid var(--line);\n  background: rgba(245,165,36,0.04);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n}\n.term-head .id {\n  color: var(--amber); font-weight: 600; margin-right: 16px;\n}\n.term-head .right { margin-left: auto; display: flex; gap: 14px; align-items: center; }\n.term-head .right .live {\n  display: inline-flex; align-items: center; gap: 6px;\n  color: var(--crit);\n}\n.term-head .right .live::before {\n  content: ''; width: 6px; height: 6px; border-radius: 50%;\n  background: var(--crit);\n  box-shadow: 0 0 8px var(--crit);\n  animation: pulse 1.2s ease-in-out infinite;\n}\n\n.term-body {\n  height: 460px;\n  padding: 16px 18px;\n  font-size: 12.5px; line-height: 1.65;\n  color: var(--txt-2);\n  overflow: hidden;\n  position: relative;\n}\n.term-body::before {\n  content: '';\n  position: absolute; left: 0; right: 0; top: 0; bottom: 0;\n  background: linear-gradient(180deg, transparent 70%, rgba(5,5,5,0.95) 100%);\n  pointer-events: none; z-index: 2;\n}\n.term-line { white-space: pre; min-height: 1.65em; }\n.term-line .ln {\n  display: inline-block; width: 30px;\n  color: var(--txt-4); text-align: right; padding-right: 12px;\n  user-select: none;\n}\n.term-line .k { color: #8ec5ff; }\n.term-line .v { color: #fafaf9; }\n.term-line .s { color: #fcd34d; }\n.term-line .c { color: var(--txt-4); font-style: italic; }\n.term-line.sys { color: var(--amber); }\n.term-line.sys-dim { color: var(--txt-3); }\n.term-line.flag {\n  background: rgba(248,113,113,0.08);\n  position: relative;\n  padding-left: 0;\n}\n.term-line.flag::before {\n  content: ''; position: absolute; left: 0; top: 0; bottom: 0;\n  width: 2px; background: var(--crit);\n}\n.term-line.flag-h { background: rgba(251,146,60,0.08); }\n.term-line.flag-h::before { background: var(--high); }\n.term-line.flag-m { background: rgba(251,191,36,0.08); }\n.term-line.flag-m::before { background: var(--med); }\n.term-line .tag {\n  display: inline-block;\n  padding: 1px 7px; margin: 0 6px;\n  font-size: 10.5px; font-weight: 700;\n  letter-spacing: 0.12em;\n  border: 1px solid currentColor;\n  vertical-align: 1px;\n}\n.tag-crit { color: var(--crit); }\n.tag-high { color: var(--high); }\n.tag-med  { color: var(--med); }\n.tag-ok   { color: var(--ok); }\n\n.term-footer {\n  padding: 10px 16px;\n  border-top: 1px solid var(--line);\n  background: rgba(0,0,0,0.4);\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 10.5px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n}\n.term-footer .progress {\n  flex: 1; height: 4px;\n  background: var(--bg-3);\n  margin: 0 16px;\n  position: relative;\n  overflow: hidden;\n}\n.term-footer .progress-fill {\n  position: absolute; left: 0; top: 0; bottom: 0;\n  width: 0%;\n  background: var(--amber);\n  box-shadow: 0 0 12px var(--amber-glow);\n  transition: width .25s linear;\n}\n\n/* Cursor */\n.cursor {\n  display: inline-block; width: 7px; height: 14px;\n  background: var(--amber);\n  vertical-align: -2px; margin-left: 2px;\n  animation: blink 1s steps(2) infinite;\n}\n@keyframes blink { 50% { opacity: 0; } }\n\n/* ═══════════════════════════════════════════════════════════════\n   VENDOR MARQUEE\n═══════════════════════════════════════════════════════════════ */\n.vendor-strip {\n  background: var(--bg-1);\n  border-top: 1px solid var(--line);\n  border-bottom: 1px solid var(--line);\n  padding: 28px 0;\n  overflow: hidden;\n  position: relative;\n}\n.vendor-strip::before, .vendor-strip::after {\n  content: ''; position: absolute; top: 0; bottom: 0; width: 120px;\n  z-index: 3; pointer-events: none;\n}\n.vendor-strip::before { left: 0; background: linear-gradient(90deg, var(--bg-1), transparent); }\n.vendor-strip::after  { right: 0; background: linear-gradient(-90deg, var(--bg-1), transparent); }\n.vendor-strip-label {\n  position: absolute; left: 32px; top: 50%; transform: translateY(-50%);\n  z-index: 4;\n  font-family: var(--f-mono); font-size: 10.5px;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--amber);\n  background: var(--bg-1);\n  padding: 4px 12px;\n  border: 1px solid var(--line-amber);\n}\n.vendor-marquee {\n  display: flex; gap: 0;\n  animation: marq2 50s linear infinite;\n  white-space: nowrap;\n  padding-left: 280px;\n}\n@keyframes marq2 { to { transform: translateX(-50%); } }\n.vendor-strip:hover .vendor-marquee { animation-play-state: paused; }\n.vendor-item {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 0 22px;\n  font-family: var(--f-mono); font-size: 12.5px;\n  color: var(--txt-2);\n  border-right: 1px dashed var(--line-md);\n  letter-spacing: 0.04em;\n}\n.vendor-item .ok {\n  font-size: 9.5px;\n  color: var(--ok);\n  letter-spacing: 0.16em;\n  border: 1px solid currentColor;\n  padding: 1px 5px;\n}\n\n/* ═══════════════════════════════════════════════════════════════\n   SECTION HEAD\n═══════════════════════════════════════════════════════════════ */\n.section-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 60px; align-items: end;\n  margin-bottom: 56px;\n  border-bottom: 1px solid var(--line);\n  padding-bottom: 32px;\n}\n.section-head .meta {\n  font-family: var(--f-mono);\n  font-size: 10.5px; letter-spacing: 0.18em;\n  color: var(--txt-3); text-transform: uppercase;\n  margin-bottom: 12px;\n  display: flex; gap: 18px;\n}\n.section-head .meta .id { color: var(--amber); }\n.section-head .lede { margin-top: 0; }\n\n/* ═══════════════════════════════════════════════════════════════\n   LIVE SCANNER (showstopper)\n═══════════════════════════════════════════════════════════════ */\n.scanner-section { background: var(--bg-1); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }\n\n.scanner-tabs {\n  display: flex; gap: 0;\n  margin-bottom: 24px;\n  border: 1px solid var(--line-md);\n  font-family: var(--f-mono);\n  width: fit-content;\n}\n.scanner-tab {\n  padding: 10px 20px;\n  font-size: 11.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n  border-right: 1px solid var(--line-md);\n  transition: all .2s;\n  background: transparent;\n}\n.scanner-tab:last-child { border-right: none; }\n.scanner-tab:hover { color: var(--txt); }\n.scanner-tab.active { background: var(--amber); color: #000; font-weight: 600; }\n\n.scanner-wrap {\n  display: grid;\n  grid-template-columns: 1.2fr 1fr;\n  gap: 0;\n  border: 1px solid var(--line-md);\n  background: var(--bg-0);\n  min-height: 580px;\n}\n.scanner-config, .scanner-findings {\n  padding: 20px;\n  font-family: var(--f-mono);\n}\n.scanner-config {\n  border-right: 1px solid var(--line);\n  position: relative;\n  overflow: hidden;\n}\n.scanner-config-head {\n  display: flex; justify-content: space-between; align-items: center;\n  padding-bottom: 14px; margin-bottom: 14px;\n  border-bottom: 1px solid var(--line);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n}\n.scanner-config-head .filename { color: var(--amber); font-weight: 600; }\n.scanner-config-body {\n  font-size: 12.5px;\n  line-height: 1.7;\n  height: 480px;\n  overflow: hidden;\n  position: relative;\n  color: var(--txt-2);\n}\n.scanner-config-body::after {\n  content: ''; position: absolute; left: 0; right: 0; top: 0; bottom: 0;\n  background: linear-gradient(180deg, transparent 65%, rgba(5,5,5,0.95));\n  pointer-events: none;\n}\n.scanner-config-line {\n  display: flex; white-space: pre;\n  position: relative;\n  padding: 0 6px;\n  transition: background .2s, color .2s;\n}\n.scanner-config-line .ln {\n  width: 36px; text-align: right; padding-right: 10px;\n  color: var(--txt-4); user-select: none; flex-shrink: 0;\n}\n.scanner-config-line.scanning { background: rgba(245,165,36,0.12); color: var(--txt); }\n.scanner-config-line.flagged { background: rgba(248,113,113,0.10); color: var(--txt); }\n.scanner-config-line.flagged.high { background: rgba(251,146,60,0.10); }\n.scanner-config-line.flagged.med  { background: rgba(251,191,36,0.10); }\n.scanner-config-line.flagged::after {\n  content: '◄'; position: absolute; right: 8px;\n  color: var(--crit); font-size: 11px;\n}\n.scanner-config-line.flagged.high::after { color: var(--high); }\n.scanner-config-line.flagged.med::after { color: var(--med); }\n\n.scan-beam {\n  position: absolute; left: 0; right: 0;\n  height: 36px; pointer-events: none;\n  background: linear-gradient(180deg,\n    transparent 0%,\n    rgba(245,165,36,0.18) 50%,\n    transparent 100%);\n  border-top: 1px solid var(--amber);\n  border-bottom: 1px solid var(--amber);\n  box-shadow: 0 0 24px var(--amber-glow);\n  opacity: 0;\n  z-index: 2;\n}\n\n.scanner-findings-head {\n  display: flex; justify-content: space-between; align-items: center;\n  padding-bottom: 14px; margin-bottom: 14px;\n  border-bottom: 1px solid var(--line);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n}\n.scanner-findings-head .count { color: var(--amber); font-weight: 600; font-size: 12px; }\n.scanner-findings-list {\n  display: flex; flex-direction: column; gap: 10px;\n  height: 480px; overflow: hidden;\n}\n.finding-card {\n  border: 1px solid var(--line);\n  background: var(--bg-1);\n  padding: 14px;\n  position: relative;\n  animation: stampIn .35s cubic-bezier(.2,.8,.2,1) both;\n}\n@keyframes stampIn {\n  from { opacity: 0; transform: translateY(8px) scale(0.98); }\n  to { opacity: 1; transform: none; }\n}\n.finding-card.crit { border-left: 2px solid var(--crit); }\n.finding-card.high { border-left: 2px solid var(--high); }\n.finding-card.med  { border-left: 2px solid var(--med); }\n\n.finding-row1 {\n  display: flex; align-items: center; gap: 10px;\n  margin-bottom: 6px;\n  font-size: 11px; letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n}\n.finding-row1 .sev {\n  font-weight: 700;\n  padding: 2px 7px;\n  border: 1px solid currentColor;\n  font-size: 10px;\n}\n.finding-row1 .sev.crit { color: var(--crit); }\n.finding-row1 .sev.high { color: var(--high); }\n.finding-row1 .sev.med  { color: var(--med); }\n.finding-row1 .ref { color: var(--amber); font-weight: 600; }\n.finding-row1 .line { margin-left: auto; font-size: 10.5px; color: var(--txt-3); }\n.finding-title {\n  font-size: 13px; color: var(--txt); font-weight: 500;\n  margin-bottom: 8px; letter-spacing: 0.005em;\n  line-height: 1.4;\n}\n.finding-meta {\n  display: flex; gap: 8px; flex-wrap: wrap;\n  font-size: 10px; letter-spacing: 0.14em;\n  text-transform: uppercase;\n}\n.finding-chip {\n  padding: 2px 7px;\n  border: 1px solid var(--line-md);\n  color: var(--txt-2);\n}\n.finding-chip.cve { color: var(--amber); border-color: var(--line-amber); }\n.finding-chip.cmp { color: var(--txt-2); }\n\n.scanner-progress-strip {\n  border-top: 1px solid var(--line);\n  padding: 16px 24px;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 24px;\n  align-items: center;\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-3);\n  background: var(--bg-0);\n}\n.scanner-progress-bar {\n  height: 6px; background: var(--bg-3); position: relative; overflow: hidden;\n}\n.scanner-progress-fill {\n  position: absolute; left: 0; top: 0; bottom: 0;\n  width: 0%; background: var(--amber);\n  box-shadow: 0 0 12px var(--amber-glow);\n  transition: width .3s ease;\n}\n.scanner-progress-fill::after {\n  content: ''; position: absolute; inset: 0;\n  background: repeating-linear-gradient(\n    -45deg,\n    rgba(0,0,0,0.18) 0 6px,\n    transparent 6px 12px\n  );\n  animation: stripes 1s linear infinite;\n}\n@keyframes stripes { to { background-position: 17px 0; } }\n.scanner-progress-info { color: var(--amber); font-weight: 600; }\n\n/* ═══════════════════════════════════════════════════════════════\n   SCORING ENGINE\n═══════════════════════════════════════════════════════════════ */\n.score-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  border: 1px solid var(--line-md);\n}\n.score-card {\n  padding: 32px 28px;\n  border-right: 1px solid var(--line);\n  position: relative;\n  transition: background .25s;\n}\n.score-card:last-child { border-right: none; }\n.score-card:hover { background: rgba(245,165,36,0.04); }\n.score-card .num {\n  font-family: var(--f-mono);\n  font-size: 11px; letter-spacing: 0.16em;\n  color: var(--txt-3); text-transform: uppercase;\n  margin-bottom: 24px;\n}\n.score-card .num .amber { color: var(--amber); }\n.score-card .gauge {\n  width: 100%; aspect-ratio: 1.6 / 1;\n  margin-bottom: 20px;\n  position: relative;\n}\n.score-card h4 {\n  font-family: var(--f-display);\n  font-size: 22px; font-weight: 600;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  margin-bottom: 8px;\n}\n.score-card p {\n  font-size: 13px; color: var(--txt-2); line-height: 1.55;\n}\n\n/* ═══════════════════════════════════════════════════════════════\n   COMPLIANCE FOLDERS\n═══════════════════════════════════════════════════════════════ */\n.comp-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 14px;\n}\n.comp-folder {\n  background: var(--bg-1);\n  border: 1px solid var(--line-md);\n  padding: 28px 26px 24px;\n  position: relative;\n  transition: all .25s;\n  overflow: hidden;\n}\n.comp-folder:hover {\n  border-color: var(--amber);\n  background: var(--bg-2);\n  transform: translateY(-3px);\n}\n.comp-folder::before {\n  /* Top-right \"classified\" stripe */\n  content: '';\n  position: absolute;\n  top: 0; right: 0; width: 64px; height: 64px;\n  background: repeating-linear-gradient(\n    -45deg,\n    rgba(245,165,36,0.18) 0 6px,\n    transparent 6px 12px\n  );\n  pointer-events: none;\n}\n.comp-folder .stamp {\n  font-family: var(--f-mono);\n  font-size: 9.5px; letter-spacing: 0.18em;\n  color: var(--amber); text-transform: uppercase;\n  border: 1px solid var(--amber);\n  padding: 3px 8px;\n  display: inline-block;\n  margin-bottom: 18px;\n}\n.comp-folder h3 {\n  font-family: var(--f-display);\n  font-size: 26px; font-weight: 700;\n  letter-spacing: -0.01em;\n  text-transform: uppercase;\n  margin-bottom: 6px;\n  line-height: 1.05;\n}\n.comp-folder .sub {\n  font-family: var(--f-mono);\n  font-size: 10.5px; letter-spacing: 0.14em;\n  color: var(--txt-3); text-transform: uppercase;\n  margin-bottom: 16px;\n}\n.comp-folder p {\n  font-size: 13px; color: var(--txt-2); line-height: 1.6;\n  margin-bottom: 16px;\n}\n.comp-folder .ctrls {\n  display: flex; gap: 6px; flex-wrap: wrap;\n}\n.comp-folder .ctrl {\n  font-family: var(--f-mono);\n  font-size: 10px; letter-spacing: 0.1em;\n  color: var(--txt-3);\n  border: 1px solid var(--line);\n  padding: 2px 7px;\n}\n.comp-folder:hover .ctrl { color: var(--amber); border-color: var(--line-amber); }\n\n/* ═══════════════════════════════════════════════════════════════\n   THREE-UP (Zero Trust / Drift / Audit chain)\n═══════════════════════════════════════════════════════════════ */\n.three-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 14px;\n}\n.three-card {\n  background: var(--bg-1);\n  border: 1px solid var(--line-md);\n  padding: 28px 26px;\n}\n.three-card .viz {\n  height: 200px;\n  margin-bottom: 22px;\n  border: 1px dashed var(--line-md);\n  background: var(--bg-0);\n  position: relative;\n  overflow: hidden;\n}\n.three-card .eyebrow { margin-bottom: 18px; }\n.three-card h3 {\n  font-family: var(--f-display);\n  font-size: 24px; font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: -0.005em;\n  margin-bottom: 8px;\n}\n.three-card p {\n  font-size: 13.5px; color: var(--txt-2); line-height: 1.6;\n}\n\n/* Drift chart */\n.drift-svg { width: 100%; height: 100%; }\n.drift-bar { fill: var(--amber); opacity: 0.85; }\n.drift-bar.crit { fill: var(--crit); }\n.drift-line { stroke: var(--amber); stroke-width: 1.5; fill: none; }\n.drift-grid { stroke: var(--line); stroke-width: 1; stroke-dasharray: 2 3; }\n\n/* Zero trust nodes */\n.zt-nodes circle { fill: var(--bg-2); stroke: var(--amber); stroke-width: 1.5; }\n.zt-nodes line { stroke: var(--amber); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0.55; }\n.zt-nodes circle.deny { stroke: var(--crit); }\n.zt-nodes line.deny { stroke: var(--crit); }\n\n/* Audit hash chain */\n.hash-row {\n  display: grid;\n  grid-template-columns: 24px 1fr;\n  gap: 10px;\n  align-items: center;\n  font-family: var(--f-mono);\n  font-size: 10.5px;\n  color: var(--txt-2);\n  padding: 5px 12px;\n  border-bottom: 1px dashed var(--line);\n}\n.hash-row:last-child { border-bottom: none; }\n.hash-row .idx { color: var(--amber); }\n.hash-row .hash { color: var(--txt-3); }\n.hash-row.tamper { background: rgba(248,113,113,0.07); color: var(--crit); }\n.hash-row.tamper .hash { color: var(--crit); text-decoration: line-through; }\n\n/* ═══════════════════════════════════════════════════════════════\n   NatMesh vs NIPPER — REDACTED COMPARISON\n═══════════════════════════════════════════════════════════════ */\n.vs-section { background: var(--bg-1); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }\n.vs-headerline {\n  font-family: var(--f-mono);\n  font-size: 11px; letter-spacing: 0.18em;\n  color: var(--amber); text-transform: uppercase;\n  margin-bottom: 14px;\n  display: flex; align-items: center; gap: 14px;\n}\n.vs-headerline span.bar { flex: 1; height: 1px; background: var(--line-amber); }\n\n.vs-table {\n  border: 1px solid var(--line-md);\n  background: var(--bg-0);\n  font-family: var(--f-mono);\n}\n.vs-row {\n  display: grid;\n  grid-template-columns: 2fr 1.1fr 1.1fr;\n  border-bottom: 1px solid var(--line);\n}\n.vs-row:last-child { border-bottom: none; }\n.vs-row > div {\n  padding: 18px 22px;\n  border-right: 1px solid var(--line);\n  font-size: 13px;\n}\n.vs-row > div:last-child { border-right: none; }\n.vs-row.head > div {\n  background: var(--bg-2);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  color: var(--txt-3);\n  text-transform: uppercase;\n  padding: 16px 22px;\n}\n.vs-row.head .col-them { color: var(--txt-2); }\n.vs-row.head .col-us {\n  color: var(--amber);\n  font-weight: 600;\n  background: rgba(245,165,36,0.06);\n  position: relative;\n}\n.vs-row.head .col-us::after {\n  content: '◆ OURS'; font-size: 9.5px; color: var(--amber);\n  position: absolute; right: 22px; top: 50%; transform: translateY(-50%);\n}\n\n.vs-row .feat {\n  font-family: var(--f-sans);\n  color: var(--txt); font-weight: 500;\n  text-transform: none;\n  letter-spacing: 0;\n  font-size: 14px;\n}\n.vs-row .feat .sub {\n  display: block;\n  font-family: var(--f-mono); font-size: 11px;\n  color: var(--txt-3); margin-top: 2px;\n  letter-spacing: 0.06em;\n}\n.vs-row .col-them {\n  color: var(--txt-2);\n}\n.vs-row .col-us {\n  background: rgba(245,165,36,0.04);\n  color: var(--amber);\n}\n\n/* Redacted bar */\n.redact {\n  display: inline-block;\n  background: #000;\n  color: transparent;\n  user-select: none;\n  padding: 2px 0;\n  position: relative;\n}\n.redact::before {\n  content: ''; position: absolute; inset: 0;\n  background: #1a1a1a;\n  background-image: repeating-linear-gradient(\n    -45deg,\n    #000 0 3px,\n    #1a1a1a 3px 6px\n  );\n}\n.vs-mark {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-weight: 600; font-size: 13px;\n}\n.vs-mar clarative YAML packs<\u002Fspan><\u002Fdiv>\n          <div class=\"col-them\"><span class=\"vs-mark no\">&nbsp;<\u002Fspan><\u002Fdiv>\n          <div class=\"col-us\"><span class=\"vs-mark yes\">YAML<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"vs-row\">\n          <div class=\"feat\">White-label reports<span class=\"sub\">company / logo / footer<\u002Fspan><\u002Fdiv>\n          <div class=\"col-them\"><span class=\"vs-mark no\">Paid add-on<\u002Fspan><\u002Fdiv>\n          <div class=\"col-us\"><span class=\"vs-mark yes\">Included<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"vs-row\">\n          <div class=\"feat\">License model<span class=\"sub\">how you pay<\u002Fspan><\u002Fdiv>\n          <div class=\"col-them\">Per-device subscription<\u002Fdiv>\n          <div class=\"col-us\"><span class=\"vs-mark yes\">One-time, per-machine<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div class=\"vs-summary\">\n        <div class=\"stamp\">DECLASSIFIED<span>05·18·2026<\u002Fspan><\u002Fdiv>\n        <p>\n          On every modern capability — <strong>Zero Trust scoring, role-weighted risk,\n          offline CVE correlation, SARIF/CI-CD output, drift detection, and a tamper-evident\n          audit trail<\u002Fstrong> — Nipper has nothing to put in the column. We respect the\n          incumbent. We just shipped the next decade of the category.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════\n     PERSONAS\n═══════════════════════════════════════════════════════════ -->\n<section id=\"personas\">\n  <div class=\"shell\">\n\n    <div class=\"section-head reveal\">\n      <div>\n        <div class=\"meta\"><span class=\"id\">§ 06 · OPERATORS<\u002Fspan><span>FOUR PROFILES · ONE LICENSE<\u002Fspan><\u002Fdiv>\n        <h2 class=\"h-section\">Who runs NatMesh.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p class=\"lede\">\n          The buyer doesn't change the engine. The engine changes the buyer's\n          mandate. Defense contractors, payment-card teams, MSSPs, and\n          DevSecOps all ship the same binary.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"persona-grid reveal\">\n\n      <div class=\"persona\">\n        <div class=\"ribbon\">CMMC · L3<\u002Fdiv>\n        <div class=\"for-use\">FOR USE BY · 01<\u002Fdiv>\n        <h4>Defense &amp; Federal<\u002Fh4>\n        <ul>\n          <li>Air-gap requirement eliminates every SaaS competitor on the list.<\u002Fli>\n          <li>DISA STIG + CMMC 2.0 packs ship pre-built — no consultant engagement.<\u002Fli>\n          <li>RMF-ready evidence drops straight into the AO's package.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"persona\">\n        <div class=\"ribbon\">PCI · QSA<\u002Fdiv>\n        <div class=\"for-use\">FOR USE BY · 02<\u002Fdiv>\n        <h4>Financial · PCI<\u002Fh4>\n        <ul>\n          <li>Tamper-evident audit log — exactly what a QSA wants to see.<\u002Fli>\n          <li>PCI-DSS 4.0 control evidence with Req 1/2/6/8/10 mapping.<\u002Fli>\n          <li>White-label PDF for the bank's annual ROC supporting evidence.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"persona\">\n        <div class=\"ribbon\">MSSP · BATCH<\u002Fdiv>\n        <div class=\"for-use\">FOR USE BY · 03<\u002Fdiv>\n        <h4>MSSPs &amp; Consultancies<\u002Fh4>\n        <ul>\n          <li>Headless CLI scans 100 configs in a batch from a single workstation.<\u002Fli>\n          <li>White-labeled PDFs swap company name, logo, and footer per client.<\u002Fli>\n          <li>One per-analyst machine license — no per-device meter to manage.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"persona\">\n        <div class=\"ribbon\">CI / CD<\u002Fdiv>\n        <div class=\"for-use\">FOR USE BY · 04<\u002Fdiv>\n        <h4>DevSecOps<\u002Fh4>\n        <ul>\n          <li>SARIF output renders natively in GitHub &amp; Azure DevOps PRs.<\u002Fli>\n          <li>Exit code 2 on critical/high — fail the build, block the merge.<\u002Fli>\n          <li>Config-as-code friendly. The rule engine is itself YAML.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════\n     CI/CD INTEGRATION\n═══════════════════════════════════════════════════════════ -->\n<section id=\"cicd\" style=\"background:var(--bg-1);border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n  <div class=\"shell\">\n\n    <div class=\"section-head reveal\">\n      <div>\n        <div class=\"meta\"><span class=\"id\">§ 07 · CI/CD<\u002Fspan><span>SARIF · FIRST-CLASS<\u002Fspan><\u002Fdiv>\n        <h2 class=\"h-section\">Drop it in your<br>pipeline. Done.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p class=\"lede\">\n          <span class=\"mono\" style=\"color:var(--amber)\">natmesh-cli<\u002Fspan> is a single static\n          binary. Add a step to your GitHub Actions or Azure DevOps pipeline.\n          The same SARIF that flows into GitHub Security tab also lands in\n          Defender, Sentinel, and any modern SIEM.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cicd-wrap reveal\">\n\n      <div class=\"code-box\">\n        <div class=\"code-head\">\n          <span class=\"label\">.github/workflows/audit.yml<\u002Fspan>\n          <span>GITHUB ACTIONS<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"code-body\"><pre style=\"margin:0;font-family:var(--f-mono);font-size:12.5px;line-height:1.75;color:var(--txt-2)\"><span class=\"c\"># Audit every config on push to main<\u002Fspan>\n<span class=\"k\">name<\u002Fspan>: <span class=\"v\">network-config-audit<\u002Fspan>\n<span class=\"k\">on<\u002Fspan>: [<span class=\"v\">push<\u002Fspan>, <span class=\"v\">pull_request<\u002Fspan>]\n\n<span class=\"k\">jobs<\u002Fspan>:\n  <span class=\"k\">audit<\u002Fspan>:\n    <span class=\"k\">runs-on<\u002Fspan>: <span class=\"v\">ubuntu-latest<\u002Fspan>\n    <span class=\"k\">steps<\u002Fspan>:\n      - <span class=\"k\">uses<\u002Fspan>: <span class=\"v\">actions/checkout@v4<\u002Fspan>\n\n      - <span class=\"k\">name<\u002Fspan>: <span class=\"v\">Run NatMesh<\u002Fspan>\n        <span class=\"k\">run<\u002Fspan>: <span class=\"p\">|<\u002Fspan>\n          <span class=\"v\">natmesh-cli scan<\u002Fspan> <span class=\"p\">\\<\u002Fspan>\n            <span class=\"v\">--config ./configs/*.cfg<\u002Fspan> <span class=\"p\">\\<\u002Fspan>\n            <span class=\"v\">--format sarif<\u002Fspan> <span class=\"p\">\\<\u002Fspan>\n            <span class=\"v\">--exit-on critical,high<\u002Fspan> <span class=\"p\">\\<\u002Fspan>\n            <span class=\"v\">--out natmesh.sarif<\u002Fspan>\n\n      - <span class=\"k\">uses<\u002Fspan>: <span class=\"v\">github/codeql-action/upload-sarif@v3<\u002Fspan>\n        <span class=\"k\">with<\u002Fspan>:\n          <span class=\"k\">sarif_file<\u002Fspan>: <span class=\"v\">natmesh.sarif<\u002Fspan>\n<\u002Fpre><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"code-box\">\n        <div class=\"code-head\">\n          <span class=\"label\">natmesh.sarif (excerpt)<\u002Fspan>\n          <span>FINDING · SARIF v2.1.0<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"code-body\"><pre style=\"margin:0;font-family:var(--f-mono);font-size:12.5px;line-height:1.75;color:var(--txt-2)\"><span class=\"p\">{<\u002Fspan>\n  <span class=\"k\">\"ruleId\"<\u002Fspan>: <span class=\"s\">\"natmesh.snmp-001\"<\u002Fspan>,\n  <span class=\"k\">\"level\"<\u002Fspan>: <span class=\"s\">\"error\"<\u002Fspan>,\n  <span class=\"k\">\"message\"<\u002Fspan>: { <span class=\"k\">\"text\"<\u002Fspan>: <span class=\"s\">\"Default SNMP community 'public'\"<\u002Fspan> },\n  <span class=\"k\">\"locations\"<\u002Fspan>: [{\n    <span class=\"k\">\"physicalLocation\"<\u002Fspan>: {\n      <span class=\"k\">\"artifactLocation\"<\u002Fspan>: { <span class=\"k\">\"uri\"<\u002Fspan>: <span class=\"s\">\"edge-fw-01.cfg\"<\u002Fspan> },\n      <span class=\"k\">\"region\"<\u002Fspan>: { <span class=\"k\">\"startLine\"<\u002Fspan>: <span class=\"v\">42<\u002Fspan> }\n    }\n  }],\n  <span class=\"k\">\"properties\"<\u002Fspan>: {\n    <span class=\"k\">\"cvss\"<\u002Fspan>: <span class=\"v\">9.8<\u002Fspan>,\n    <span class=\"k\">\"stig\"<\u002Fspan>: <span class=\"s\">\"CAT-I\"<\u002Fspan>,\n    <span class=\"k\">\"cwe\"<\u002Fspan>: <span class=\"s\">\"CWE-798\"<\u002Fspan>,\n    <span class=\"k\">\"natmesh-role-score\"<\u002Fspan>: <span class=\"v\">87<\u002Fspan>,\n    <span class=\"k\">\"compliance\"<\u002Fspan>: [<span class=\"s\">\"PCI-DSS 2.1\"<\u002Fspan>, <span class=\"s\">\"STIG-V-220547\"<\u002Fspan>]\n  }\n<span class=\"p\">}<\u002Fspan>\n\n<span class=\"c\"># Pipeline summary<\u002Fspan>\n<span class=\"o\">✓<\u002Fspan> <span class=\"k\">scan complete<\u002Fspan>: <span class=\"v\">1247 lines · 12 findings · 3 critical<\u002Fspan>\n<span class=\"o\">✗<\u002Fspan> <span class=\"k\">exit code 2<\u002Fspan>: <span class=\"v\">build blocked by critical findings<\u002Fspan>\n<\u002Fpre><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════\n     PRICING\n═══════════════════════════════════════════════════════════ -->\n<section id=\"pricing\">\n  <div class=\"shell\">\n\n    <div class=\"section-head reveal\">\n      <div>\n        <div class=\"meta\"><span class=\"id\">§ 08 · LICENSE<\u002Fspan><span>MACHINE-LOCKED · OFFLINE<\u002Fspan><\u002Fdiv>\n        <h2 class=\"h-section\">One license file.<br>One machine. No server.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p class=\"lede\">\n          Pay once. The license file <span class=\"mono\" style=\"color:var(--amber)\">natmesh.lic<\u002Fspan>\n          binds to a machine ID and works forever on that workstation.\n          No phone-home. No subscription meter. No SaaS dependency to lose\n          when your contract changes.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"price-grid reveal\">\n\n      <div class=\"price-tier\">\n        <div class=\"tag\"><span>TIER · 01<\u002Fspan><span>SOLO<\u002Fspan><\u002Fdiv>\n        <h3>Analyst<\u002Fh3>\n        <p class=\"blurb\">One workstation. One operator. Everything an in-house security engineer needs to audit their fleet.<\u002Fp>\n        <div class=\"price\"><span class=\"cur\">$<\u002Fspan>1,499<\u002Fdiv>\n        <div class=\"per\">One-time · per machine · perpetual<\u002Fdiv>\n        <ul>\n          <li>All 202 security rules<\u002Fli>\n          <li>All 28 vendor parsers<\u002Fli>\n          <li>All 6 compliance frameworks<\u002Fli>\n          <li>PDF · HTML · Excel · CSV · SARIF · JSON<\u002Fli>\n          <li>Drift &amp; tamper-evident audit chain<\u002Fli>\n          <li>GUI + headless CLI<\u002Fli>\n          <li class=\"no\">White-label branding<\u002Fli>\n          <li class=\"no\">Priority support SLA<\u002Fli>\n        <\u002Ful>\n        <a href=\"#contact\" class=\"pbtn\">Request License<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"price-tier featured\">\n        <div class=\"tag\"><span>TIER · 02<\u002Fspan><span class=\"featured-mark\">◆ MOST CHOSEN<\u002Fspan><\u002Fdiv>\n        <h3>Field Unit<\u002Fh3>\n        <p class=\"blurb\">For MSSPs and consultancies. Five analyst seats, white-label reports, scheduled batch scans.<\u002Fp>\n        <div class=\"price\"><span class=\"cur\">$<\u002Fspan>5,990<\u002Fdiv>\n        <div class=\"per\">One-time · 5 machines · perpetual<\u002Fdiv>\n        <ul>\n          <li>Everything in Analyst<\u002Fli>\n          <li>Five machine-locked licenses<\u002Fli>\n          <li>White-label reports (logo · name · footer)<\u002Fli>\n          <li>Scheduled scans + golden baseline alerts<\u002Fli>\n          <li>Batch CLI · 100+ configs / run<\u002Fli>\n          <li>CI/CD pipeline templates<\u002Fli>\n          <li>Email support · 1 business day<\u002Fli>\n          <li class=\"no\">On-prem training engagement<\u002Fli>\n        <\u002Ful>\n        <a href=\"#contact\" class=\"pbtn\">Request License<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"price-tier\">\n        <div class=\"tag\"><span>TIER · 03<\u002Fspan><span>FLEET<\u002Fspan><\u002Fdiv>\n        <h3>Command<\u002Fh3>\n        <p class=\"blurb\">For defense primes, federal SI, and large financial. Unlimited seats. Custom rule packs. On-site enablement.<\u002Fp>\n        <div class=\"price\" style=\"font-size:32px;letter-spacing:-0.005em\">Custom<\u002Fdiv>\n        <div class=\"per\">Contact for quote<\u002Fdiv>\n        <ul>\n          <li>Everything in Field Unit<\u002Fli>\n          <li>Unlimited machine licenses<\u002Fli>\n          <li>Custom rule packs (we write, you own)<\u002Fli>\n          <li>Air-gap install &amp; classified-net guidance<\u002Fli>\n          <li>Dedicated Signal channel + named TAM<\u002Fli>\n          <li>On-site enablement (1 week, included)<\u002Fli>\n          <li>Source escrow available<\u002Fli>\n          <li>Priority CVE-pack updates<\u002Fli>\n        <\u002Ful>\n        <a href=\"#contact\" class=\"pbtn\">Talk to us<\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════\n     FAQ\n═══════════════════════════════════════════════════════════ -->\n<section id=\"faq\" style=\"background:var(--bg-1);border-top:1px solid var(--line)\">\n  <div class=\"shell\">\n\n    <div class=\"faq-layout\">\n\n      <div class=\"faq-intro reveal\">\n        <div class=\"meta\" style=\"font-family:var(--f-mono);font-size:10.5px;letter-spacing:0.18em;color:var(--txt-3);text-transform:uppercase;margin-bottom:14px\">\n          <span style=\"color:var(--amber)\">§ 09 · FAQ<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h-section\">Questions<br>we get often.<\u002Fh2>\n        <p class=\"lede\" style=\"margin-top:18px\">\n          If something isn't here, ask. Engineers answer Engineering.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"faq-list reveal\">\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·01<\u002Fspan>Does NatMesh ever phone home?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p>No. Zero telemetry. No license server. No update beacon. <code>natmesh.lic<\u002Fcode> is verified locally against the machine ID. The binary runs on air-gapped Class C networks without modification.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·02<\u002Fspan>How is CVE matching offline?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p>A curated KB of 22 high-impact real-world CVEs ships in the binary (CVE-2024-3400, CVE-2024-21762, CVE-2023-27997, CVE-2022-42475, CVE-2018-0101, and others). An offline NVD JSON cache lives at <code>~/.natmesh/nvd_cache/<\u002Fcode>. The live NVD API is opt-in only.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·03<\u002Fspan>Can my team add custom rules?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p>Yes. Rules are pure YAML — <code>prerequisite_patterns<\u002Fcode>, <code>required_patterns<\u002Fcode>, <code>negative_patterns<\u002Fcode>, plus the narrative fields that flow directly into the report (<code>checked_text<\u002Fcode>, <code>matters_text<\u002Fcode>, <code>impact_rating<\u002Fcode>). No Python required to extend the engine.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·04<\u002Fspan>What's actually different about your scoring?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p>Four parallel scores per finding: CVSS v3.1, DISA STIG CAT, Cisco SIR, and a NatMesh 0–100 composite weighted by the device's role in the traffic path. The same SNMP \"public\" community on a border firewall and an access switch produce very different role-weighted numbers.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·05<\u002Fspan>How is the audit trail tamper-evident?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p>Every scan event is hash-chained to the prior event. <code>verify_audit_integrity()<\u002Fcode> walks the chain end-to-end. A single altered byte anywhere in the history breaks the chain and is flagged.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·06<\u002Fspan>What does the CLI exit code mean?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p><code>natmesh-cli<\u002Fcode> exits <code>0<\u002Fcode> on clean, <code>1<\u002Fcode> on info/low findings, and <code>2<\u002Fcode> on any critical or high finding. Drop it in CI with <code>--exit-on critical,high<\u002Fcode> and your pipeline will block the merge automatically.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-q\"><span class=\"num\">Q·07<\u002Fspan>Is it really a one-time license?<span class=\"chev\"><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><div><p>Yes. The license file binds to a machine ID and is perpetual on that workstation. Annual maintenance is optional — and only buys you new rule packs and CVE updates. The engine you bought continues to run regardless.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════\n     CTA\n═══════════════════════════════════════════════════════════ -->\n<section class=\"cta-section\" id=\"contact\">\n  <div class=\"shell\" style=\"position:relative\">\n    <div class=\"cta-meta\">REQUEST · CLR-LIC-2026 · FORM A<\u002Fdiv>\n    <h2>Pull the trigger<br>on the audit you've been<br>deferring.<\u002Fh2>\n    <p>Fifteen-day evaluation license. Drops onto one machine. No demos to sit through, no SDR to dodge — the binary just runs.<\u002Fp>\n    <div class=\"cta-btns\">\n      <a href=\"mailto:license@natmesh.dev?subject=NatMesh%20License%20Request\" class=\"btn btn-primary btn-stamp\">\n        Request License File\n        <span class=\"arrow\">→<\u002Fspan>\n      <\u002Fa>\n      <a href=\"mailto:hello@natmesh.dev\" class=\"btn\">Talk to engineering<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════════════════════════════\n     FOOTER\n═══════════════════════════════════════════════════════════ -->\n<footer>\n  <div class=\"shell\">\n    <div class=\"foot-grid\">\n\n      <div class=\"foot-brand\">\n        <div class=\"brand\" style=\"display:flex;align-items:center;gap:14px\">\n          <span class=\"brand-mark\">NM<\u002Fspan>\n          <span>\n            <span class=\"brand-name\">NatMesh<\u002Fspan><span class=\"brand-tag\">CONFIG · SECURITY · AUDIT<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mono-block\">\n          BUILD · <span class=\"amber\">1.4.2<\u002Fspan><br>\n          RULES · <span class=\"amber\">202<\u002Fspan><br>\n          PARSERS · <span class=\"amber\">28<\u002Fspan><br>\n          NVD-CACHE · <span class=\"amber\">2026-05-15<\u002Fspan><br>\n          TELEMETRY · <span class=\"amber\">NONE<\u002Fspan>\n
